<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#2b2b2f"/>
      <stop offset="1" stop-color="#1b1b1f"/>
    </linearGradient>
    <style>
      .bg{fill:url(#g)}
      .phone{fill:#0f0f12;stroke:#444;stroke-width:2}
      .title{fill:#fff;font-family:Arial,Helvetica,sans-serif;font-size:36px;font-weight:700}
      .subtitle{fill:#bdb8c8;font-family:Arial,Helvetica,sans-serif;font-size:16px}
      .card{fill:#2a2730;stroke:#3a3942;stroke-width:1;rx:12}
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" rx="12"/>

  <!-- phone mockup -->
  <g transform="translate(80,40)">
    <rect width="740" height="440" rx="28" class="phone"/>
    <rect x="26" y="28" width="688" height="384" rx="18" fill="#111"/>

    <!-- app header -->
    <text x="56" y="76" class="title">AnyFile Opener</text>
    <text x="56" y="106" class="subtitle">The universal router for your files</text>

    <!-- grid of action cards -->
    <g transform="translate(48,136)">
      <rect class="card" width="168" height="96" rx="12"/>
      <rect class="card" x="196" width="168" height="96" rx="12"/>
      <rect class="card" x="392" width="168" height="96" rx="12"/>
      <rect class="card" x="588" width="168" height="96" rx="12"/>

      <rect class="card" y="120" width="168" height="96" rx="12"/>
      <rect class="card" x="196" y="120" width="168" height="96" rx="12"/>
      <rect class="card" x="392" y="120" width="168" height="96" rx="12"/>
      <rect class="card" x="588" y="120" width="168" height="96" rx="12"/>

      <text x="16" y="56" fill="#d9d6e6" font-size="18">Video</text>
      <text x="212" y="56" fill="#d9d6e6" font-size="18">Audio</text>
      <text x="408" y="56" fill="#d9d6e6" font-size="18">Image</text>
      <text x="604" y="56" fill="#d9d6e6" font-size="18">APK</text>
    </g>
  </g>

  <!-- footer label -->
  <text x="72" y="500" class="subtitle">This is a placeholder screenshot. Replace with a real screenshot in ./images/</text>

</svg>
