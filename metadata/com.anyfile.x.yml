AutoName: AnyFile Opener

Description: |-
  AnyFile Opener is an intent-driven Android file routing utility. It detects likely
  file types from bounded header and container inspection, then safely forwards the
  granted content URI to an application selected by the user.

  It also provides a binary inspector, multi-file queue, recent-file shortcuts and
  user-managed default application rules for MIME types and file extensions.

